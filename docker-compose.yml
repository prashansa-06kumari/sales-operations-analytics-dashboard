version: '3.8'

services:
  backend:
    build: ./sales-bi-enterprise/backend
    ports:
      - "8000:8000"
    volumes:
      - ./sales-bi-enterprise/backend/sales_bi.db:/app/sales_bi.db
    environment:
      - NODE_ENV=production
      - PORT=8000

  frontend:
    build:
      context: ./sales-bi-enterprise/frontend
      args:
        - VITE_API_URL=http://localhost:8000/api
    ports:
      - "5173:80"
    depends_on:
      - backend
